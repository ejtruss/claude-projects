function fuzzy(input, target) {

  const stopWords = /^(the|fc|cf|city|united|county|state|university|of|and|a|an)$/;
  const norm = s => s.toLowerCase().trim()
    .replace(/[^a-z0-9 ]/g, '')
    .split(' ').filter(w => w && !stopWords.test(w)).join('');
  const a = norm(input), b = norm(target);
  if (!a) return false;
  if (a === b) return true;

  if (b.includes(a) && a.length >= 3) return true;
  if (a.includes(b) && b.length >= 3) return true;

  const maxDist = b.length <= 5 ? 1 : b.length <= 9 ? 2 : 3;
  if (Math.abs(a.length - b.length) > maxDist) return false;

  const dp = Array.from({length: a.length + 1}, (_, i) => [i, ...Array(b.length).fill(0)]);
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[a.length][b.length] <= maxDist;
}

const AudioCtx = typeof window !== 'undefined' ? (window.AudioContext || window.webkitAudioContext) : null;
let _actx = null;
let _muted = false;

function getCtx() {
  if (!AudioCtx) return null;
  if (!_actx) _actx = new AudioCtx();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

function setMuted(m) { _muted = m; }

function playTone({ freq = 440, type = 'sine', gain = 0.4, attack = 0.01, decay = 0.1, sustain = 0.0, release = 0.3, duration = 0.4, detune = 0 } = {}) {
  if (_muted) return;
  const ctx = getCtx(); if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  osc.detune.setValueAtTime(detune, now);
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(gain, now + attack);
  env.gain.linearRampToValueAtTime(gain * sustain || gain * 0.6, now + attack + decay);
  env.gain.linearRampToValueAtTime(0, now + duration + release);
  osc.connect(env); env.connect(ctx.destination);
  osc.start(now); osc.stop(now + duration + release + 0.05);
}

function playNoise({ gain = 0.15, duration = 0.12, freq = 200, q = 1 } = {}) {
  if (_muted) return;
  const ctx = getCtx(); if (!ctx) return;
  const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = q;
  const env = ctx.createGain();
  const now = ctx.currentTime;
  env.gain.setValueAtTime(gain, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + duration);
  src.connect(filter); filter.connect(env); env.connect(ctx.destination);
  src.start(now); src.stop(now + duration + 0.05);
}

const WORKER_URL = "https://crimson-mode-5ecf.trussej.workers.dev/";

async function callClaude(prompt) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: 2000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`API ${res.status}: ${t}`); }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const raw = data.content.map(b => b.text || "").join("");
  const match = raw.replace(/```json|```/g, "").trim().match(/\[[\s\S]*\]/);
  if (!match) throw new Error("No JSON array in response");
  return match[0];
}

const MECHANIC_LABELS = { qa: "Q & A", sporcle: "Sporcle Round", tf: "True or False", feud: "Family Feud" };

async function generateSingleQuestion(mechanic, catName) {
  const seed = Math.random().toString(36).slice(2,8);
  let prompt;
  if (mechanic === 'qa') {
    prompt = `[seed:${seed}] Generate exactly 1 creative trivia question about: "${catName}". Avoid obvious questions.
Respond ONLY with a JSON object, no markdown: { "question": "...", "answer": "..." }`;
  } else if (mechanic === 'tf') {
    prompt = `[seed:${seed}] Generate exactly 1 true or false statement about: "${catName}". Make it non-obvious and interesting.
Respond ONLY with a JSON object, no markdown: { "statement": "...", "answer": true, "explanation": "..." }`;
  } else if (mechanic === 'feud') {
    prompt = `[seed:${seed}] Generate exactly 1 Family Feud style survey question about: "${catName}". 6-8 answers ranked most-to-least common, keep answers 1-4 words.
Respond ONLY with a JSON object, no markdown: { "question": "Name something...", "answers": ["...","..."] }`;
  }
  const raw = await callClaude(prompt);
  // strip markdown fences if present
  const clean = raw.trim().replace(/```json\s*/gi,'').replace(/```/g,'').trim();
  let parsed;
  try {
    parsed = JSON.parse(clean);
  } catch(e) {
    // try wrapping in array
    parsed = JSON.parse('[' + clean + ']');
  }
  const result = Array.isArray(parsed) ? parsed[0] : parsed;
  if (!result) throw new Error('Empty result from Claude');
  return result;
}

:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.3s}.feud-pip.hit{border-color:#f87171;background:rgba(248,113,113,0.15);animation:pipPop 0.4s ease}@keyframes pipPop{0%{transform:scale(0.4)}60%{transform:scale(1.3)}100%{transform:scale(1)}}.feud-red-flash{position:fixed;inset:0;background:#f87171;pointer-events:none;z-index:500;animation:redFlash 0.45s ease forwards}@keyframes redFlash{0%{opacity:0.5}100%{opacity:0}}.feud-shake{animation:feudShake 0.45s ease}@keyframes feudShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px)}40%,80%{transform:translateX(10px)}}.steal-banner{text-align:center;padding:20px 24px;background:var(--surface);border:2px solid #FFD200;border-radius:16px;animation:stealIn 0.4s cubic-bezier(0.2,1.4,0.4,1)}@keyframes stealIn{0%{opacity:0;transform:scale(0.88)}100%{opacity:1;transform:scale(1)}}.steal-title{font-family:var(--font-d);font-size:clamp(36px,5vw,64px);letter-spacing:4px;color:#FFD200;text-transform:uppercase;margin-bottom:4px}.steal-sub{font-family:var(--font-c);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}.slot-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}.slot-lbl{font-family:var(--font-c);font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--muted)}.slot-window{background:var(--surface);border:2px solid rgba(255,255,255,0.12);border-radius:16px;padding:20px 56px;min-width:300px;text-align:center;transition:all 0.4s}.slot-name{font-family:var(--font-d);font-size:clamp(36px,6vw,72px);letter-spacing:3px;text-transform:uppercase}.slot-sub{font-family:var(--font-c);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:4px;opacity:0;transition:opacity 0.4s}.slot-sub.show{opacity:1}`

function QAScreen({currentRound,qIdx,roundIdx,teams,scores,revealed,setRevealed,adjustPoint,setScore,nextQ,rerollQ,tc,onLiveReroll}) {
  const [ptsDone,setPtsDone]=useState(false);
  const [rerolling,setRerolling]=useState(false);
  const [localQ,setLocalQ]=useState(()=>currentRound.questions?.[qIdx]||{});
  useEffect(()=>{
    setPtsDone(false);setRerolling(false);
    setLocalQ(currentRound.questions?.[qIdx]||{});
    setRevealed(false);
  },[qIdx]);
  async function handleLiveReroll(){
    setRerolling(true);
    try{
      const newQ=await onLiveReroll('qa',currentRound.name);
      if(newQ&&newQ.question){ setLocalQ(newQ); setRevealed(false); setPtsDone(false); }
    }finally{ setRerolling(false); }
  }
  return(
    <div className="game-screen">
      <ScoreBar teams={teams} scores={scores} onAdjust={adjustPoint} onSetScore={setScore}/>
      <div className="q-card" style={{borderColor:tc(roundIdx).main+"30"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${tc(roundIdx).main},transparent)`,borderRadius:"20px 20px 0 0"}}/>
        <div className="round-chip">
          <div className="round-dot" style={{background:tc(roundIdx).main}}/>
          {currentRound.name} &nbsp;·&nbsp; Q{qIdx+1} of {currentRound.questions?.length}
        </div>
        <div className="question-display">{localQ.question}</div>
        <div className="answer-reveal" style={{marginBottom:revealed?16:24}}>
          {!revealed
            ?<button className="answer-hidden" onClick={()=>{setRevealed(true);SFX.correct();}}><span>▶</span> Reveal Answer</button>
            :<div className="answer-shown">{localQ.answer}</div>}
        </div>
        {revealed&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {teams.map((t,i)=>(
              <button key={t.id}
                style={{flex:1,minWidth:100,padding:"10px 14px",border:`1px solid ${tc(i).main}60`,borderRadius:8,background:tc(i).dim,color:tc(i).main,fontFamily:"var(--font-c)",fontSize:14,fontWeight:700,letterSpacing:1,cursor:"pointer",transition:"all 0.12s"}}
                onMouseOver={e=>e.currentTarget.style.background=tc(i).glow}
                onMouseOut={e=>e.currentTarget.style.background=tc(i).dim}
                onClick={()=>{adjustPoint(t.id,1);SFX.point();setPtsDone(true);}}>+1 {t.name}</button>
            ))}
          </div>
        )}
        <div className="host-controls">
          {!ptsDone&&<button className="ctrl-btn reroll" onClick={handleLiveReroll} disabled={rerolling}>{rerolling?'…':'↺ Reset Q'}</button>}
          <button className="ctrl-btn next" onClick={nextQ}>{qIdx+1>=(currentRound.questions?.length||0)?"END ROUND →":"NEXT QUESTION →"}</button>
        </div>
      </div>
      <div className="q-progress">
        {Array.from({length:currentRound.questions?.length||0}).map((_,i)=>(

const MAX_STRIKES = 3;
function SporcleRound({round,roundIdx,teams,scores,onAdjust,onSetScore,onFinish}) {
  const items=round.items||[];
  const [guessed,setGuessed]=useState(new Set());
  const [inputVal,setInputVal]=useState('');
  const [strikes,setStrikes]=useState(()=>{const s={};teams.forEach(t=>{s[t.id]=0;});return s;});
  const [turnIdx,setTurnIdx]=useState(0);
  const [eliminated,setEliminated]=useState([]);
  const [wrongFlash,setWrongFlash]=useState(null);
  const [done,setDone]=useState(false);
  const [winner,setWinner]=useState(null);
  const [lastResult,setLastResult]=useState(null);
  const inputRef=useRef(null);
  useEffect(()=>{if(!done)inputRef.current?.focus();},[turnIdx,done]);
  const activeTeams=teams.filter(t=>!eliminated.includes(t.id));
  const currentTeam=activeTeams[turnIdx%Math.max(activeTeams.length,1)];
  const currentTeamIdx=teams.indexOf(currentTeam);
  function submitAnswer(){
    if(done||!inputVal.trim())return;
    for(const item of items){
      if(!guessed.has(item)&&fuzzy(inputVal,item)){
        const next=new Set([...guessed,item]);
        setGuessed(next);setInputVal('');setLastResult('correct');
        setTimeout(()=>setLastResult(null),600);SFX.tilePop();setTurnIdx(i=>i+1);
        if(next.size>=items.length){setDone(true);setWinner(currentTeam);setTimeout(()=>SFX.winner(),100);}
        return;
      }
    }
    handleWrong();
  }
  function handleWrong(){
    if(done||!currentTeam)return;
    setLastResult('wrong');setTimeout(()=>setLastResult(null),600);
    const ns={...strikes,[currentTeam.id]:(strikes[currentTeam.id]||0)+1};
    setStrikes(ns);setWrongFlash(currentTeam.id);setTimeout(()=>setWrongFlash(null),500);setInputVal('');SFX.wrong();
    if(ns[currentTeam.id]>=MAX_STRIKES){
      const newElim=[...eliminated,currentTeam.id];setEliminated(newElim);setTimeout(()=>SFX.eliminated(),80);
      const rem=teams.filter(t=>!newElim.includes(t.id));
      if(rem.length===1){setWinner(rem[0]);setDone(true);setTimeout(()=>SFX.winner(),300);return;}
      else if(rem.length===0){setDone(true);return;}
    }
    setTurnIdx(i=>i+1);
  }
  const pips=(id)=>{const s=strikes[id]||0;return '❌'.repeat(s)+'○'.repeat(Math.max(0,MAX_STRIKES-s));};
  const bc=lastResult==='correct'?'#4ade80':lastResult==='wrong'?'#f87171':'rgba(255,255,255,0.15)';
  return(
    <div className="sporcle-screen">
      <ScoreBar teams={teams} scores={scores} onAdjust={onAdjust} onSetScore={onSetScore} style={{marginBottom:14}}/>
      <div className="duel-teams">
        {teams.map((t,i)=>{
          const isActive=!done&&currentTeam?.id===t.id;
          const isElim=eliminated.includes(t.id);
          return(
            <div key={t.id} className={`duel-card${isActive?' active':''}${isElim?' eliminated':''}${wrongFlash===t.id?' wrong-flash':''}`}
              style={{borderColor:isActive?tc(i).main:tc(i).main+'28',background:isActive?tc(i).dim:'transparent',boxShadow:isActive?`0 0 28px ${tc(i).glow}`:'none'}}>
              <div className="duel-name" style={{color:tc(i).main}}>{t.name}</div>
              <div className="duel-strikes">{isElim?'💀':pips(t.id)}</div>
              <div className="duel-status">{isElim?'Eliminated':isActive?'👈 Their turn':'Waiting…'}</div>
            </div> );
        })}
      </div>
      {!done?(
        <div style={{background:'var(--surface)',border:`1px solid ${tc(currentTeamIdx).main}35`,borderRadius:14,padding:'18px 22px'}}>
          <div style={{fontFamily:'var(--font-c)',fontSize:13,letterSpacing:3,textTransform:'uppercase',color:'var(--muted)',marginBottom:10}}>
            {currentTeam?.name} — name a {round.name}
          </div>
          <div className="sporcle-input-row">
            <input ref={inputRef} className="sporcle-input" placeholder="Type answer, press Enter…"
              value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitAnswer()}
              autoComplete="off" autoCorrect="off" spellCheck="false"
              style={{borderColor:bc,transition:'border-color 0.2s'}}/>
            <button className="timer-ctrl-btn" style={{borderColor:'#f8717155',color:'#f87171'}} onClick={handleWrong}>✗ Pass</button>
          </div>
          <div style={{fontFamily:'var(--font-c)',fontSize:11,letterSpacing:2,color:'var(--muted)',marginTop:10}}>
            {guessed.size}/{items.length} found · Press Enter to submit
          </div>
        </div>
      ):(
        <div className="sporcle-done">
          <div className="sporcle-done-score">{guessed.size}/{items.length}</div>
          <div className="sporcle-done-label">{winner?`${winner.name} wins!`:'Round over'}</div>
          <div className="sporcle-award-row">
            {teams.map((t,i)=>(
              <button key={t.id} className="sporcle-award-btn"
                style={{borderColor:tc(i).main+'60',color:tc(i).main,background:tc(i).dim}}
                onClick={()=>{onAdjust(t.id,1);SFX.point();}}>+1 {t.name}</button> ))}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap',marginBottom:16}}>
            {items.filter(x=>!guessed.has(x)).slice(0,12).map((x,i)=>(
              <span key={i} style={{padding:'3px 10px',borderRadius:100,background:'rgba(248,113,113,0.08)',border:'1px solid rgba(248,113,113,0.2)',color:'#f87171',fontFamily:'var(--font-c)',fontSize:12}}>{x}</span> ))}
          </div>
          <button className="ctrl-btn next" onClick={onFinish}>End Round →</button>
        </div>
      )}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 18px',marginTop:4}}>
        <div style={{fontFamily:'var(--font-c)',fontSize:10,letterSpacing:2,textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>
          {done?'Full Answer List':`${round.name} — ${items.length} total`}
        </div>
        <div className="answer-grid">
          {items.map((item,i)=>(
            <div key={i} className={`answer-tile${guessed.has(item)?' revealed':''}`}>{guessed.has(item)?item:''}</div> ))}
        </div>
      </div>
    </div>
  );
}
function SlotMachine({teams,onDone}) {
  const [idx,setIdx]=useState(0);
  const [winner,setWinner]=useState(null);
  const ref=useRef(null);
  useEffect(()=>{
    const w=Math.floor(Math.random()*teams.length);
    let ticks=0,total=24+teams.length*4;
    function tick(){
      SFX.slotTick();
      setIdx(i=>(i+1)%teams.length);
      ticks++;
      const left=total-ticks;
      const delay=left>8?65:65+(8-left)*65;
      if(ticks>=total){setIdx(w);setWinner(w);SFX.slotLand();return;}
      ref.current=setTimeout(tick,delay);
    }
    ref.current=setTimeout(tick,65);
    return()=>clearTimeout(ref.current);
  },[]);
  const col=winner!==null?tc(winner).main:'rgba(255,255,255,0.55)';
  return(
    <div className="slot-overlay">
      <div className="slot-lbl">Who goes first?</div>
      <div className="slot-window" style={{borderColor:winner!==null?col:'rgba(255,255,255,0.12)',boxShadow:winner!==null?`0 0 40px ${col}30`:'none'}}>
        <div className="slot-name" style={{color:col}}>{teams[idx]?.name}</div>
        <div className={`slot-sub${winner!==null?' show':''}`}>Goes First!</div>
      </div>
      {winner!==null&&<button onClick={()=>onDone(winner)}
        style={{padding:'13px 44px',background:col,border:'none',borderRadius:12,fontFamily:'var(--font-d)',fontSize:18,letterSpacing:3,color:'#080810',cursor:'pointer',marginTop:8}}>PLAY</button>}
    </div>
  );
}
const FEUD_STRIKES=3;
const FEUD_POINTS=3;
function FamilyFeud({round,qIdx,setQIdx,teams,scores,onAdjust,onSetScore,onFinish,tc,onReroll}) {
  // local questions — initialized from props, updated directly on reroll
  const [localQuestions,setLocalQuestions]=useState(()=>round.questions||[]);
  // sync only when the round itself changes (new round, new game)
  useEffect(()=>{ setLocalQuestions(round.questions||[]); },[round.name]);
  const q=localQuestions[qIdx]||{};
  const answers=q.answers||[];

  // Slot machine only on question 0; subsequent questions rotate clockwise from slot winner
  const [slotWinnerRef] = useState({val:0}); // persists across qIdx changes
  const decideFirstTeam = (w) => (w + qIdx) % teams.length;

  const [phase,setPhase]=useState('slot');
  const [slotWinner,setSlotWinner]=useState(0);
  const [originalPlayerIdx,setOriginalPlayerIdx]=useState(0);
  const [activeIdx,setActiveIdx]=useState(0);
  const [passerIdx,setPasserIdx]=useState(null);
  const [found,setFound]=useState(new Set());
  const [strikes,setStrikes]=useState(0);
  const strikesRef=useRef(0);
  const [input,setInput]=useState('');
  const [flash,setFlash]=useState(null);
  const [redFlash,setRedFlash]=useState(false);
  const [shake,setShake]=useState(false);
  const [tried,setTried]=useState(new Set());
  const inputRef=useRef(null);
  const [rerolling,setRerolling]=useState(false);

  useEffect(()=>{
    if(qIdx===0){
      setPhase('slot');
    } else {
      const next=decideFirstTeam(slotWinnerRef.val);
      setActiveIdx(next);
      setOriginalPlayerIdx(next);
      setPhase('decision');
    }
    setFound(new Set());setStrikes(0);strikesRef.current=0;setInput('');setTried(new Set());setPasserIdx(null);setRerolling(false);
  },[qIdx]);
  useEffect(()=>{if(phase==='playing'||phase==='steal')inputRef.current?.focus();},[phase,activeIdx]);

  function doFlash(t){setFlash(t);setTimeout(()=>setFlash(null),600);}
  function doShake(){setShake(true);setTimeout(()=>setShake(false),500);}
  function doRed(){setRedFlash(true);setTimeout(()=>setRedFlash(false),450);}

  function onSlotDone(w){
    slotWinnerRef.val=w;
    setSlotWinner(w);
    setActiveIdx(w);
    setOriginalPlayerIdx(w);
    setPhase('decision');
  }

  function handlePlay(){setPhase('playing');}

  async function handleReroll(){
    if(rerolling)return;
    setRerolling(true);
    try{
      // call parent to generate new question and get it back
      const newQ = onReroll ? await onReroll() : null;
      if(newQ && newQ.question){
        // update local questions immediately — no waiting for parent re-render
        setLocalQuestions(qs=>{
          const updated=[...qs];
          updated[qIdx]=newQ;
          return updated;
        });
      }
      // reset turn state regardless
      setFound(new Set());
      setStrikes(0);strikesRef.current=0;
      setInput('');setTried(new Set());setPasserIdx(null);
      setPhase('decision');
    }catch(e){
      console.error('Reroll error:',e);
    }finally{
      setRerolling(false);
    }
  }
  function handlePass(){
    setPasserIdx(originalPlayerIdx);
    const next=(originalPlayerIdx+1)%teams.length;
    setActiveIdx(next);
    setPhase('playing');
  }

  function submitPlay(){
    if(!input.trim())return;
    for(const ans of answers){
      if(!found.has(ans)&&fuzzy(input,ans)){
        const next=new Set([...found,ans]);
        setFound(next);setInput('');doFlash('correct');
        SFX.tilePop();SFX.point();
        if(next.size>=answers.length){
          onAdjust(teams[activeIdx].id,FEUD_POINTS);
          setPhase('done');setTimeout(()=>SFX.winner(),100);
        }
        return;
      }
    }
    strike();
  }

  function strike(){
    strikesRef.current+=1;
    const s=strikesRef.current;
    setStrikes(s);setInput('');doFlash('wrong');doShake();doRed();
    if(s>=FEUD_STRIKES){
      SFX.threeStrikes();
      setTimeout(()=>{
        if(answers.filter(a=>!found.has(a)).length===0){
          onAdjust(teams[activeIdx].id,FEUD_POINTS);
          setPhase('done');return;
        }
        // steal: everyone except originalPlayer (and passer) gets a turn
        // skipSet starts with originalPlayer + passer
        const skipSet=new Set([originalPlayerIdx, passerIdx].filter(x=>x!==null));
        let stealStart=(originalPlayerIdx+1)%teams.length,checked=0;
        while(skipSet.has(stealStart)&&checked<teams.length){stealStart=(stealStart+1)%teams.length;checked++;}
        setActiveIdx(stealStart);
        setTried(new Set()); // nobody has tried yet — originalPlayer is excluded via skipSet logic
        SFX.stealTension();
        setPhase('steal');
      },900);
    } else SFX.bigWrong();
  }

  function submitSteal(){
    if(!input.trim())return;
    const rem=answers.filter(a=>!found.has(a));
    for(const ans of rem){
      if(fuzzy(input,ans)){
        // successful steal
        onAdjust(teams[activeIdx].id,FEUD_POINTS);
        setFound(new Set(answers));setInput('');SFX.stealSuccess();setTimeout(()=>SFX.winner(),200);setPhase('done');return;
      }
    }
    // missed steal
    setInput('');SFX.stealMiss();doShake();
    const t=new Set([...tried,activeIdx]);
    // always skip originalPlayer and passer — they never get to steal
    const alwaysSkip=new Set([originalPlayerIdx, passerIdx].filter(x=>x!==null));
    // find next eligible stealer: not in alwaysSkip, not already tried
    let next=(activeIdx+1)%teams.length,checked=0;
    while((alwaysSkip.has(next)||t.has(next))&&checked<teams.length){next=(next+1)%teams.length;checked++;}
    // if everyone eligible has tried → original player gets points
    const allTried=teams.every((_,i)=>alwaysSkip.has(i)||t.has(i));
    if(allTried){
      setTimeout(()=>{
        onAdjust(teams[originalPlayerIdx].id,FEUD_POINTS);

        setPhase('done');
      },800);

      setTried(t);
      setTimeout(()=>{setActiveIdx(next);SFX.stealTension();},900);
    }
  }

  const rem=answers.filter(a=>!found.has(a));
  const tcA=tc(activeIdx);
  const tcS=tc(slotWinner);
  const bc=flash==='correct'?'#4ade80':flash==='wrong'?'#f87171':'rgba(255,255,255,0.15)';

  return(
    <div className="sporcle-screen">
      {phase==='slot'&&<SlotMachine teams={teams} onDone={onSlotDone}/>}
      {redFlash&&<div className="feud-red-flash"/>}
      <ScoreBar teams={teams} scores={scores} onAdjust={onAdjust} onSetScore={onSetScore} style={{marginBottom:4}}/>

      {/* Always show the board */}
      <div className="feud-board">
        <div style={{fontFamily:"var(--font-c)",fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Question {qIdx+1} of {localQuestions.length}</div>
        <div className="feud-question">{q.question}</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:16}}>
          <span style={{fontFamily:'var(--font-c)',fontSize:11,letterSpacing:3,textTransform:'uppercase',color:'var(--muted)'}}>This question worth</span>
          <span style={{fontFamily:'var(--font-d)',fontSize:22,color:'#FFD200',letterSpacing:2}}>{FEUD_POINTS} PTS</span>
          <span style={{fontFamily:'var(--font-c)',fontSize:11,letterSpacing:3,textTransform:'uppercase',color:'var(--muted)'}}>· winner takes all</span>
        </div>
        <div className="feud-grid">
          {answers.map((ans,i)=>(
            <div key={i} className={`feud-tile${found.has(ans)?' found':''}`}>{found.has(ans)?ans:String(i+1)}</div>
          ))}
        </div>
      </div>

      {/* Decision phase — play or pass */}
      {phase==='decision'&&(
        <div style={{background:'var(--surface)',border:`2px solid ${tc(originalPlayerIdx).main}`,borderRadius:14,padding:'22px 26px',textAlign:'center'}}>
          <div style={{fontFamily:'var(--font-c)',fontSize:11,letterSpacing:3,textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Your turn</div>
          <div style={{fontFamily:'var(--font-d)',fontSize:28,letterSpacing:2,color:tc(originalPlayerIdx).main,marginBottom:18,textTransform:'uppercase'}}>{teams[originalPlayerIdx]?.name}</div>
          <div style={{fontFamily:'var(--font-c)',fontSize:13,letterSpacing:1,color:'var(--muted)',marginBottom:22}}>Do you want to play this question or pass to the next team?</div>
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            <button onClick={handlePlay}
              style={{padding:'14px 36px',background:tc(originalPlayerIdx).main,border:'none',borderRadius:10,fontFamily:'var(--font-d)',fontSize:18,letterSpacing:3,color:'#080810',cursor:'pointer'}}>
              PLAY
            </button>
            <button onClick={handlePass}
              style={{padding:'14px 36px',background:'transparent',border:`1px solid ${tc(originalPlayerIdx).main}60`,borderRadius:10,fontFamily:'var(--font-d)',fontSize:18,letterSpacing:3,color:tc(originalPlayerIdx).main,cursor:'pointer'}}>
              PASS
            </button>
            <button onClick={handleReroll} disabled={rerolling}

              {rerolling?'…':'↺ Reset Q'}
            </button>
          </div>
        </div>
      )}

      {/* Playing phase */}
      {phase==='playing'&&(
        <div className={`feud-panel${shake?' feud-shake':''}`} style={{borderColor:tcA.main,boxShadow:`0 0 24px ${tcA.glow}`}}>
          <div className="feud-panel-label">Playing</div>
          <div className="feud-panel-team" style={{color:tcA.main}}>{teams[activeIdx]?.name}</div>
          <div className="feud-strikes">
            {Array.from({length:FEUD_STRIKES}).map((_,i)=>(

            ))}
          </div>
          <div className="sporcle-input-row">
            <input ref={inputRef} className="sporcle-input" placeholder="Type answer and press Enter…"
              value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submitPlay()}
              autoComplete="off" autoCorrect="off" spellCheck="false" style={{borderColor:bc,transition:'border-color 0.2s'}}/>
            <button className="timer-ctrl-btn" style={{borderColor:'#f8717155',color:'#f87171'}} onClick={strike}>✗ Strike</button>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,gap:8}}>
            <div style={{fontFamily:'var(--font-c)',fontSize:11,letterSpacing:2,color:'var(--muted)'}}>{found.size} found · {rem.length} remaining</div>

            )}
          </div>
        </div>
      )}

      {/* Steal phase */}
      {phase==='steal'&&(
        <div className={`steal-banner${shake?' feud-shake':''}`}>
          <div className="steal-title">STEAL!</div>
          <div className="steal-sub" style={{color:tcA.main}}>{teams[activeIdx]?.name} — one guess for {FEUD_POINTS} pts</div>
          <div className="sporcle-input-row" style={{maxWidth:500,margin:'0 auto'}}>

    ["Pop Culture","Sports","History","Science","Geography"],

    ["Sports Legends","Video Games","Countries","Famous Quotes","Literature"],
    ["Celebrity News","Ancient History","Inventions","World Capitals","Mythology"],
    ["Marvel Movies","Classic Rock","The Olympics","Famous Paintings","World Cuisine"],
    ["NBA","NFL","Harry Potter","Disney","The 80s"],
    ["True Crime","The Solar System","Famous Scientists","Broadway Musicals","World Wars"],
  ];
  const RANDOM_MECHANICS = ["qa","qa","tf","feud","sporcle"];
  function randomizeCats() {
    const pool = RANDOM_SUGGESTIONS[Math.floor(Math.random()*RANDOM_SUGGESTIONS.length)];
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    const newCats = shuffled.map((name,i) => ({
      id: nextCatId.current++,
      name,
      mechanic: RANDOM_MECHANICS[Math.floor(Math.random()*RANDOM_MECHANICS.length)],

    if (teams.some(t => !t.name.trim())) { setErr("Name all teams first."); return; }
    if (categories.length === 0) { setErr("Add at least one category."); return; }
    if (categories.some(c => !c.name.trim())) { setErr("Name all categories first."); return; }
    if (categories.some(c => !c.count || c.count < 1)) { setErr("All categories need at least 1 question."); return; }

            `[seed:${seed}] Generate exactly ${cat.count || 4} Family Feud style survey questions about: "${cat.name}". Rules: avoid the most obvious questions for this topic, vary the style (name a thing, name a place, name something you'd do, etc), make answers feel genuinely survey-like. Keep answers short (1-4 words), ranked most-to-least common.

          </div>
        )}

        {/* SETUP */}
        {screen === "setup" && (
          <div className="setup-card">
            <div className="brand">TRIVIO</div>
            <div className="brand-sub">AI Trivia & Game Night Generator</div>
            <div className="sec-label">Teams</div>
            <div className="teams-grid"> {teams.map((t, i) => ( <div key={t.id} className="team-input-wrap"> <div className="team-dot" style={{background: tc(i).main}} /> <input className="team-input" style={{borderColor: tc(i).main + "40"}} value={t.name} onChange={e => updateTeam(t.id, e.target.value)} placeholder={`Team ${i + 1}`} /> {teams.length > 2 && <button className="cat-del" style={{position:'absolute',right:8}} onClick={()=>setTeams(ts=>ts.filter(x=>x.id!==t.id))}>×</button>} </div> ))} {teams.length < 4 && <button className="add-team-btn" onClick={addTeam}>+ Add Team</button>}
            </div>
            <hr className="divider" />
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div className="sec-label" style={{marginBottom:0}}>Categories & Rounds</div>
              <button onClick={randomizeCats} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,padding:"4px 10px",color:"var(--muted)",fontFamily:"var(--font-c)",fontSize:11,letterSpacing:2,textTransform:"uppercase",cursor:"pointer"}}>🎲 Randomize</button>
            </div>
            <div className="cat-list"> {categories.map((cat, i) => ( <div key={cat.id} className="cat-row"> <input className="cat-input" placeholder={`Category name (e.g. "NBA Teams")`} value={cat.name} onChange={e => updateCat(cat.id, "name", e.target.value)} /> <select className="cat-select" value={cat.mechanic} onChange={e => updateCat(cat.id, "mechanic", e.target.value)}> <option value="qa">Q & A</option> <option value="sporcle">Sporcle</option> <option value="tf">True or False</option> <option value="feud">Family Feud</option> </select> <input className="cat-num" type="number" min={1} max={50} value={cat.count ?? ''} onChange={e=>{const v=e.target.value;updateCat(cat.id,"count",v===''?'':Math.max(1,parseInt(v)||1));}} onBlur={e=>{if(e.target.value==='')updateCat(cat.id,"count",1);}} /> <button className="cat-del" onClick={() => removeCat(cat.id)}>×</button> </div> ))}
            </div>
            <button className="add-cat-btn" onClick={addCat}>+ Add Category</button>
            {err && <div className="err">{err}</div>}
            <button className="start-btn" onClick={startGame} disabled={false}> GENERATE & START
            </button>
          </div>
        )}

        {/* GENERATING */}
        {screen === "generating" && (
          <div className="gen-screen">
            <div className="gen-spinner" />
            <div className="gen-text">BUILDING YOUR QUIZ</div>
            <div className="gen-sub">{genStatus}</div>
          </div>
        )}

        {/* ROUND SUMMARY */}
        {screen === "roundsummary" && currentRound && (
          <div style={{textAlign:"center",zIndex:1,position:"relative",width:"100%",maxWidth:560}}>
            <div style={{fontFamily:"var(--font-c)",fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Round {roundIdx+1} Complete</div>
            <div style={{fontFamily:"var(--font-d)",fontSize:"clamp(36px,6vw,52px)",letterSpacing:2,textTransform:"uppercase",marginBottom:6,background:`linear-gradient(135deg,${tc(roundIdx).main},white)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>{currentRound.name}</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,margin:"24px 0",width:"100%"}}>
              {[...teams].sort((a,b)=>(scores[b.id]||0)-(scores[a.id]||0)).map((t,rank)=>{
                const i=teams.indexOf(t);
                const total=scores[t.id]||0;
                return(
                  <div key={t.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderRadius:10,border:`1px solid ${tc(i).main}40`,background:tc(i).dim}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"var(--font-d)",fontSize:20,color:tc(i).main,minWidth:28}}>{rank===0?"🥇":rank===1?"🥈":rank===2?"🥉":"#"+(rank+1)}</span>
                      <span style={{fontFamily:"var(--font-c)",fontSize:16,fontWeight:700,letterSpacing:1,color:tc(i).main,textTransform:"uppercase"}}>{t.name}</span>
                    </div>
                    <span style={{fontFamily:"var(--font-d)",fontSize:26,color:tc(i).main}}>{total} pts</span>
                  </div>
                );
              })}
            </div>
            <button className="begin-btn" style={{background:"white",color:"#080810"}} onClick={continueFromSummary}>
              {roundIdx+1>=rounds.length?"See Final Results →":"Next Round →"}
            </button>
          </div>
        )}

        {/* INTRO */}
        {screen === "intro" && currentRound && (
          <IntroScreen
            currentRound={currentRound}
            roundIdx={roundIdx}
            rounds={rounds}
            teams={teams}
            scores={scores}
            editingList={editingList}
            setEditingList={setEditingList}
            setRounds={setRounds}
            beginRound={beginRound}
            tc={tc}
            MECHANIC_LABELS={MECHANIC_LABELS}
          />
        )}

        {screen === "game" && currentRound && (
          <QAScreen currentRound={currentRound} qIdx={qIdx} roundIdx={roundIdx}
            teams={teams} scores={scores} revealed={revealed} setRevealed={setRevealed}
            adjustPoint={adjustPoint} setScore={setScore} nextQ={nextQ} rerollQ={rerollQ} tc={tc}
            onLiveReroll={liveRerollQ}/>
        )}

        {/* TRUE OR FALSE */}
        {screen === "tf" && currentRound && (
          <TrueFalseRound
            currentRound={currentRound}
            qIdx={qIdx}
            roundIdx={roundIdx}
            teams={teams}
            scores={scores}
            revealed={revealed}
            setRevealed={setRevealed}
            adjustPoint={adjustPoint}
            setScore={setScore}
            nextQ={nextQ}
            rerollQ={rerollQ}
            tc={tc}
            onLiveReroll={liveRerollQ}
          />
        )} {/* SPORCLE ROUND */}
        {screen === "sporcle" && currentRound && (
          <SporcleRound
            round={currentRound}
            roundIdx={roundIdx}
            teams={teams}
            scores={scores}
            onAdjust={adjustPoint}
            onSetScore={setScore}
            onFinish={advanceRound}
          />
        )}

        {/* FAMILY FEUD */}
        {screen === "feud" && currentRound && (
          <FamilyFeud
            round={currentRound}
            qIdx={qIdx}
            setQIdx={setQIdx}
            teams={teams}
            scores={scores}
            onAdjust={adjustPoint}
            onSetScore={setScore}
            onFinish={advanceRound}
            tc={tc}
            onReroll={liveRerollFeudQ}
          />
        )}

        {screen === "end" && (
          <EndScreen teams={teams} scores={scores} sortedTeams={sortedTeams} winner={winner} onPlayAgain={() => { setScreen("setup"); setRounds([]); setRoundIdx(0); setQIdx(0); setScores({}); }} tc={tc} />
        )}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PubQuiz));
  </script>
</body>
</html>
